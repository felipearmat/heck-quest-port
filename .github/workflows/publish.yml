# Build Chroma and Noodle Extensions for Quest 1.40.7; create release with both .qmods.
# Tag format: bs_version-heck_version (e.g. 1.40.7-1.8.0)
name: Build and Publish

on:
  push:
    tags:
      - '*-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      # Setup qpm-rust and NDK (restore: false — we restore in each project).
      # working-directory: chroma so the action finds qpm.json (repo root has none).
      - name: QPM Rust + NDK
        uses: Fernthedev/qpm-rust-action@v1
        with:
          workflow_token: ${{ secrets.GITHUB_TOKEN }}
          resolve_ndk: true
          restore: false
          cache: true
          publish: "never"
        working-directory: chroma

      - name: Restore and build Chroma
        working-directory: chroma
        run: |
          qpm-rust restore
          qpm-rust s build
          qpm-rust qmod zip

      - name: Restore and build Noodle Extensions
        working-directory: noodleextensions
        run: |
          qpm-rust restore
          qpm-rust s build
          qpm-rust qmod zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: heck-quest-qmods
          path: |
            chroma/Chroma.qmod
            noodleextensions/NoodleExtensions.qmod
            chroma/build/libchroma.so
            noodleextensions/build/libnoodleextensions.so

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: heck-quest-qmods
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Heck (Quest) ${{ github.ref_name }}
          files: |
            release/chroma/Chroma.qmod
            release/noodleextensions/NoodleExtensions.qmod
            release/chroma/build/libchroma.so
            release/noodleextensions/build/libnoodleextensions.so
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
